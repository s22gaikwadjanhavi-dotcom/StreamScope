<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netflix App</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Feather Icons -->
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-gradient-to-br from-black via-[#141414] to-gray-900 text-white font-sans flex flex-col items-center justify-center min-h-screen relative">

  <!-- Title -->
  <h1 class="text-5xl font-extrabold text-red-600 mt-10 tracking-wide drop-shadow-[0_0_15px_rgba(229,9,20,0.8)] flex items-center gap-3 animate-fadeIn">
    🎬 Netflix Recommendation System
  </h1>

  <!-- Form Card -->
  <form action="/recommend" method="POST" 
        class="mt-12 bg-[#1f1f1f]/90 backdrop-blur-md p-10 rounded-2xl shadow-[0_0_25px_rgba(229,9,20,0.5)] flex flex-col items-center space-y-6 w-[28rem] border border-gray-700 animate-slideUp">
    
    <!-- Genre Input with Glow -->
    <div class="flex items-center w-full bg-[#2a2a2a] rounded-lg px-4 py-3 border border-gray-700 focus-within:ring-2 focus-within:ring-red-600 transition duration-300 hover:shadow-[0_0_15px_rgba(229,9,20,0.6)]">
      <i data-feather="film" class="text-red-500 mr-3"></i>
      <input type="text" name="genre" placeholder="Enter Genre" required
             class="w-full bg-transparent text-white placeholder-gray-400 focus:outline-none">
    </div>

    <!-- Type Select with Glow -->
    <div class="flex items-center w-full bg-[#2a2a2a] rounded-lg px-4 py-3 border border-gray-700 focus-within:ring-2 focus-within:ring-red-600 transition duration-300 hover:shadow-[0_0_15px_rgba(229,9,20,0.6)]">
      <i data-feather="tv" class="text-red-500 mr-3"></i>
      <select name="type"
              class="w-full bg-transparent text-white focus:outline-none">
        <option value="Movie">Movie</option>
        <option value="TV Show">TV Show</option>
      </select>
    </div>

    <!-- Submit Button with Glow -->
    <button type="submit"
            class="w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white font-semibold py-3 rounded-lg transition duration-300 ease-in-out shadow-[0_0_20px_rgba(229,9,20,0.7)] flex items-center justify-center gap-2 hover:scale-105">
      <i data-feather="play"></i> Recommend
    </button>
  </form>

  <!-- Dashboard Link -->
  <a href="/dashboard" 
     class="mt-10 text-lg text-red-500 hover:text-red-400 transition duration-300 ease-in-out underline-offset-4 hover:underline flex items-center gap-2 animate-bounce">
    <i data-feather="bar-chart-2"></i> 📊 View Business Dashboard
  </a>

  <!-- Activate Feather Icons -->
  <script>
    feather.replace();
  </script>

  <!-- Custom Animations -->
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 1.2s ease-out forwards; }
    .animate-slideUp { animation: slideUp 1.2s ease-out forwards; }
  </style>
</body>
</html>
