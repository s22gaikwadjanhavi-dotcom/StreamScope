<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recommendations</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Feather Icons -->
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-gradient-to-br from-black via-[#141414] to-gray-900 text-white font-sans flex flex-col items-center min-h-screen py-12">

  <!-- Title -->
  <h2 class="text-4xl font-bold text-red-600 mb-8 flex items-center gap-2 drop-shadow-lg">
    <i data-feather="star" class="text-red-500"></i> 🎬 Recommended Content
  </h2>

  <!-- Recommendations List -->
  <ul class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-5xl px-6">
    {% for item in results %}
      <li class="bg-[#1f1f1f]/80 backdrop-blur-md rounded-xl shadow-lg p-6 flex flex-col items-center transition transform hover:scale-105 hover:shadow-red-600/50">
        <i data-feather="film" class="text-red-500 mb-3"></i>
        <p class="text-lg font-semibold">{{ item.title }}</p>
        <span class="text-sm text-gray-400 mt-1">⭐ {{ item.rating }}</span>
      </li>
    {% endfor %}
  </ul>

  <!-- Back Link -->
  <a href="/" 
     class="mt-12 text-lg text-red-500 hover:text-red-400 transition duration-300 ease-in-out flex items-center gap-2 underline-offset-4 hover:underline">
    <i data-feather="arrow-left"></i> ⬅ Back
  </a>

  <!-- Activate Feather Icons -->
  <script>
    feather.replace();
  </script>
</body>
</html>
